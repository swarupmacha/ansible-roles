---
- name: "Create EC2 Instance and ROute 53 records"
  hosts: all
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-089e67667eb98e2e5
    Envi: Dev
    action: create
    domain_name: "swarupmacha.online."
    instance:
      - mongodb
      - catalogue
  tasks:
  - name: "Creating EC2 Instance"
    amazon.aws.ec2_instance:
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      instance_type: t3.micro
      name: "{{ item }} - {{ Envi }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Enviroment: "{{ Envi }}"
        Name: "{{ item }} - {{ Envi }}"
    loop: "{{ instance }}"
    register: ec2_output
    when:
      action == "create"
  
  - name: printing the ec2_output
    debug:
      msg: "{{ ec2_output }}"
    when:
      action == "create"
  
  - name: "Creating Route53 Records"
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}-{{ Envi }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"
    when:
      action == "create"
  
  - name: "Creating Route53 Records"
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "roboshop-{{ Envi }}.{{ domain_name }}" 
      type: A
      ttl: 1
      overwrite: true
      value: "{{ item.instances[0].public_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"
    when: 
    - item.item == "frontend"
    - action == "create"
  
  - name: "Deleting Route53 Records"
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{ item }}-{{ Envi }}.{{ domain_name }}"
      type: A
    loop: "{{ instance }}"
    when:
      action == "delete"

  - name: "Deleting EC2 Instance"
    amazon.aws.ec2_instance:
      state: absent
      name: "{{ item }} - {{ Envi }}"
    loop: "{{ instance }}"
    when:
      action == "delete"